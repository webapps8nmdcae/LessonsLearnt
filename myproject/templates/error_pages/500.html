<body class="authentication-bg">
    <style>
        body.authentication-bg {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }
        .error-container {
            text-align: center;
            padding: 50px 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 0.8s ease-out;
            max-width: 600px;
            width: 100%;
        }
        .text-error {
            font-size: 8rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 10px;
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 10px 20px rgba(0,0,0,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .text-error i {
            font-size: 6rem;
            color: #00d2ff;
            -webkit-text-fill-color: initial;
            margin: 0 10px;
        }
        .error-title {
            font-size: 2rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            color: #ffffff;
        }
        .error-desc {
            font-size: 1.1rem;
            color: #d1d5db;
            margin-bottom: 35px;
        }
        .btn-return {
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            border: none;
            padding: 12px 35px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
        }
        .btn-return:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 210, 255, 0.5);
            color: #fff;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

    <div class="account-pages w-100">
        <div class="container d-flex justify-content-center">
            <div class="error-container">
                <div class="text-error">500</div>
                <h3 class="error-title">Internal Server Error</h3>
                <p class="error-desc">
                    Why not try refreshing your page? If the problem persists, you can return to the main hub.
                </p>
                <a href="https://webapps.nmdc.ae/" class="btn-return">
                    <i class="fa fa-home"></i> Return to WebApps
                </a>
            </div>
        </div>
    </div>

</body>

</html>
